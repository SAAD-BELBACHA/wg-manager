services:
  - type: web
    name: wg-manager
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /
    disk:
      name: wg-manager-data
      mountPath: /app/persistent
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/persistent/wg_app.db
      - key: UPLOAD_FOLDER
        value: /app/persistent/uploads

  - type: web
    name: zofri-app
    runtime: static
    buildCommand: cd mobile && npm ci && npm run export:web
    staticPublishPath: mobile/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://wg-manager-r5ni.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
