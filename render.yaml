databases:
  - name: zofri-db
    plan: free
    region: frankfurt
    databaseName: zofri
    user: zofri

services:
  - type: web
    name: wg-manager
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zofri-db
          property: connectionString
      - key: MOBILE_APP_URL
        value: https://zofri-app.onrender.com

  - type: web
    name: zofri-app
    runtime: static
    buildCommand: cd mobile && npm ci && npm run export:web
    staticPublishPath: mobile/dist
    envVars:
      - key: EXPO_PUBLIC_API_URL
        value: https://wg-manager-r5ni.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
